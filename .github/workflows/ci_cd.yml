name: CI /CD MLOPS Projet 1 (adding MLFlow)

on:
  push:
    branches:  ["main"]
  pull_request:
    branches: ["main"]



job:
  ci:
    runs-on: ubuntu-latest
    steps:
      - names: Get Python code
        uses: actions/checkout@v4

      - names: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - names: Install dependencies
        run: |
          python -m pip install pip --upgrade
          pip install -r requirements.txt

      - names: Run tests
        run: pytest tests/ -v


  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - names: get Python Code
        uses: actions/checkout@v4

      - names: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - names: Install dependencies
        run: |
          python -m install pip --upgrade pip
          pip intall r requirements.txt 

      - names: Train 
        run: | 
          python src/models/train.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          MLFLOW_TRACKING_URI: file:./reports/logs

      - names: Upload MLflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployed-model
          path: mlflow_model
          retention-days: 5






